<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV Cheatsheet</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #search { margin: 20px; width: 300px; }
        section { margin: 10px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <input type="text" id="search" placeholder="Search sections and subsections...">
    <div id="content">
        <section id="section1" onclick="clearSearch()">
            <h2>Section 1</h2>
            <h3>Subsection 1.1</h3>
            <p>Notes for Subsection 1.1</p>
            <h3>Subsection 1.2</h3>
            <p>Notes for Subsection 1.2</p>
        </section>
        <section id="section2" onclick="clearSearch()">
            <h2>Section 2</h2>
            <h3>Subsection 2.1</h3>
            <p>Notes for Subsection 2.1</p>
            <h3>Example 2.1</h3>
            <p>Example for Subsection 2.1</p>
        </section>
        <!-- Additional sections and subsections can be added here -->
    </div>
    <script>
        const searchInput = document.getElementById('search');
        const content = document.getElementById('content');

        searchInput.addEventListener('input', function() {
            const query = this.value.toLowerCase();
            const sections = content.querySelectorAll('section');
            sections.forEach(section => {
                const subsections = section.querySelectorAll('h3, p');
                let sectionMatches = false;
                subsections.forEach(subsection => {
                    if (subsection.innerText.toLowerCase().includes(query)) {
                        sectionMatches = true;
                        subsection.classList.remove('hidden');
                    } else {
                        subsection.classList.add('hidden');
                    }
                });
                section.classList.toggle('hidden', !sectionMatches);
            });
        });

        function clearSearch() {
            searchInput.value = '';
            const sections = content.querySelectorAll('section');
            sections.forEach(section => {
                section.querySelectorAll('h3, p').forEach(subsection => {
                    subsection.classList.remove('hidden');
                });
            });
        }
    </script>
</body>
</html>
